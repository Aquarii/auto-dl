name: Publish Obtainium APK as GitHub Release

on:
  workflow_dispatch:
env:
  VERSION: v1.4.3

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Create dl folder
        run: mkdir -p dl/

      - name: Download APK
        run: |
          FILE_URL="https://github.com/ImranR98/Obtainium/releases/download/${{ env.VERSION }}/app-arm64-v8a-release.apk"
          curl -L -o dl/app-arm64-v8a-release.apk "$FILE_URL"

      - name: Create ZIP
        run: |
          cd dl/
          zip -q -j app-arm64-v8a-release.apk.zip app-arm64-v8a-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Obtainium APK v${{ env.VERSION }}
          body: |
            This is the official Obtainium APK for Android.
          files: |
            dl/app-arm64-v8a-release.apk.zip
